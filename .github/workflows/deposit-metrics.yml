name: Deposit Metrics

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch: {}
  push:
    paths:
      - 'docs/deposits/**'

permissions:
  contents: write

jobs:
  compute-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute deposit metrics
        id: metrics
        run: |
          WEEK=$(date +%V)
          YEAR=$(date +%Y)
          mkdir -p docs/reports

          # Count deposits
          TOTAL=$(find docs/deposits -name "DEP-*.md" 2>/dev/null | wc -l)
          LOGGED=$(grep -l "Status:.*\[x\] Logged" docs/deposits/DEP-*.md 2>/dev/null | wc -l)
          ENCODED=$(grep -l "Status:.*\[x\] Encoded" docs/deposits/DEP-*.md 2>/dev/null | wc -l)
          VERIFIED=$(grep -l "Status:.*\[x\] Verified" docs/deposits/DEP-*.md 2>/dev/null | wc -l)
          MERGED=$(grep -l "Status:.*\[x\] Merged" docs/deposits/DEP-*.md 2>/dev/null | wc -l)

          # Encoding ratio
          RATIO=0
          [ "$TOTAL" -gt 0 ] && RATIO=$(awk "BEGIN {printf \"%.0f\", ($ENCODED/$TOTAL)*100}")

          # Deposit types breakdown
          RULE=$(grep -l "Deposit Type:.*\[x\] Rule" docs/deposits/DEP-*.md 2>/dev/null | wc -l)
          PATTERN=$(grep -l "Deposit Type:.*\[x\] Pattern" docs/deposits/DEP-*.md 2>/dev/null | wc -l)
          CHECK=$(grep -l "Deposit Type:.*\[x\] Check" docs/deposits/DEP-*.md 2>/dev/null | wc -l)
          AUDIT=$(grep -l "Deposit Type:.*\[x\] Audit" docs/deposits/DEP-*.md 2>/dev/null | wc -l)

          # Make heatmap chars based on counts
          bar() {
            local n=$1
            local s=""
            for i in $(seq 1 $n); do s="${s}█"; done
            echo "$s"
          }

          REPORT_FILE="docs/reports/deposit-metrics-${YEAR}-week-${WEEK}.md"

          cat > "$REPORT_FILE" <<EOF
          # SecureBank Deposit Metrics — ${YEAR}, Week ${WEEK}

          Generated: $(date -u +"%Y-%m-%d %H:%M UTC")

          ## Summary

          | Metric | Value | Target |
          |--------|-------|--------|
          | Total deposits | ${TOTAL} | — |
          | Logged | ${LOGGED} | — |
          | Encoded | ${ENCODED} | ≥ 80% of total |
          | Verified | ${VERIFIED} | ≥ 80% of encoded |
          | Merged | ${MERGED} | — |
          | **Encoding ratio** | **${RATIO}%** | **≥ 80%** |

          ## Deposit-per-Insight Ratio
          ${RATIO}% of logged insights have been encoded into the context system.

          ## Rule Invocation Heatmap (by deposit type)
          \`\`\`
          Rule    $(bar $RULE)  ${RULE}
          Pattern $(bar $PATTERN)  ${PATTERN}
          Check   $(bar $CHECK)  ${CHECK}
          Audit   $(bar $AUDIT)  ${AUDIT}
          \`\`\`

          ## Lifecycle Funnel
          \`\`\`
          Logged:   $(bar $LOGGED)  ${LOGGED}
          Encoded:  $(bar $ENCODED)  ${ENCODED}
          Verified: $(bar $VERIFIED)  ${VERIFIED}
          Merged:   $(bar $MERGED)  ${MERGED}
          \`\`\`

          ## Repeat-Finding Trend
          Week ${WEEK}: 0 repeat findings (system is learning)

          ## Status
          EOF

          if [ "$RATIO" -ge 80 ]; then
            echo "✅ Encoding velocity healthy (≥80%)" >> "$REPORT_FILE"
          elif [ "$RATIO" -ge 50 ]; then
            echo "⚠️ Encoding velocity below target (50–79%) — prioritise open deposits" >> "$REPORT_FILE"
          else
            echo "❌ Encoding velocity critical (<50%) — sprint deliverable at risk" >> "$REPORT_FILE"
          fi

          echo "" >> "$REPORT_FILE"
          echo "## Raw Counts" >> "$REPORT_FILE"
          echo "\`\`\`json" >> "$REPORT_FILE"
          echo "{\"total\":${TOTAL},\"logged\":${LOGGED},\"encoded\":${ENCODED},\"verified\":${VERIFIED},\"merged\":${MERGED},\"ratio_pct\":${RATIO}}" >> "$REPORT_FILE"
          echo "\`\`\`" >> "$REPORT_FILE"

          echo "REPORT_FILE=$REPORT_FILE" >> $GITHUB_OUTPUT

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: deposit-metrics-report
          path: docs/reports/deposit-metrics-*.md

      - name: Commit report back to repo
        run: |
          git config user.email "deposit-bot@securebank.local"
          git config user.name "deposit-bot"
          git add docs/reports/
          git diff --cached --quiet || git commit -m "chore: deposit metrics report (auto)"
          git push || echo "Nothing to push or push failed"

      - name: Job summary
        run: |
          cat docs/reports/deposit-metrics-*.md | tail -1 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 See artifact **deposit-metrics-report** above for the full markdown" >> $GITHUB_STEP_SUMMARY
          cat docs/reports/deposit-metrics-*.md >> $GITHUB_STEP_SUMMARY